apiVersion: apps/v1
kind: Deployment
metadata:
  name: wavesearch-frontend
  labels:
    app: wavesearch-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wavesearch-frontend
  template:
    metadata:
      labels:
        app: wavesearch-frontend
        component: frontend
    spec:
      containers:
      - name: wavesearch-frontend
        image: ghcr.io/willeastbury/wavesearch-labs-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8806
          name: http
        env:
        - name: PORT
          value: "8806"
        - name: WAVE_STS_URL
          value: ""
        - name: WAVESEARCH_API_URL
          value: ""
        - name: WAVESTORE_ERP_API_URL
          value: ""
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8806
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8806
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wavesearch-frontend
  labels:
    app: wavesearch-frontend
spec:
  type: ClusterIP
  ports:
  - port: 8806
    targetPort: 8806
    protocol: TCP
    name: http
  selector:
    app: wavesearch-frontend
