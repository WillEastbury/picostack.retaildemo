apiVersion: v1
kind: Secret
metadata:
  name: wave-sts-secret
type: Opaque
stringData:
  # NOTE: In production, use Azure KeyVault or similar instead of checking in
  # Base64 is NOT encryption. This is for demo/dev only. Replace with your own 32-char secret.
  secret: "dev-wave-sts-secret-change-me-in-prod"
---
apiVersion: v1
kind: Secret
metadata:
  name: wavesearch-repl-secret
type: Opaque
stringData:
  # Shared secret between wavesearch-api pods for the multi-reader/single-writer
  # replication engine (X-PW-Write-Token on /repl/* and /gossip/* -- see
  # docs/wavesearch-api-multi-reader-single-writer.md and wavesearch_repl.py).
  # Demo/dev only, as above -- replace with your own secret in production.
  writeToken: "dev-wavesearch-repl-token-change-me-in-prod"

