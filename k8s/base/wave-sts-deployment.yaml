apiVersion: apps/v1
kind: Deployment
metadata:
  name: wave-sts
  labels:
    app: wave-sts
    component: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wave-sts
  template:
    metadata:
      labels:
        app: wave-sts
        component: auth
    spec:
      containers:
      - name: wave-sts
        image: ghcr.io/willeastbury/wave-sts:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8801
          name: http
        env:
        - name: PORT
          value: "8801"
        - name: WAVE_STS_SECRET
          valueFrom:
            secretKeyRef:
              name: wave-sts-secret
              key: secret
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8801
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8801
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wave-sts
  labels:
    app: wave-sts
spec:
  type: ClusterIP
  ports:
  - port: 8801
    targetPort: 8801
    protocol: TCP
    name: http
  selector:
    app: wave-sts
