apiVersion: apps/v1
kind: Deployment
metadata:
  name: wavestore-frontend
  labels:
    app: wavestore-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wavestore-frontend
  template:
    metadata:
      labels:
        app: wavestore-frontend
        component: frontend
    spec:
      containers:
      - name: wavestore-frontend
        image: ghcr.io/willeastbury/wavestore-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8804
          name: http
        env:
        - name: PORT
          value: "8804"
        - name: WAVE_STS_URL
          value: "http://wave-sts:8801"
        - name: WAVESEARCH_API_URL
          value: "http://wavesearch-api:8803"
        - name: WAVESTORE_ERP_API_URL
          value: "http://wavestore-erp-api:8802"
        - name: WAVE_STS_SECRET
          valueFrom:
            secretKeyRef:
              name: wave-sts-secret
              key: secret
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8804
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8804
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wavestore-frontend
  labels:
    app: wavestore-frontend
spec:
  type: ClusterIP
  ports:
  - port: 8804
    targetPort: 8804
    protocol: TCP
    name: http
  selector:
    app: wavestore-frontend
