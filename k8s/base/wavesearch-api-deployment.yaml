# SUPERSEDED by wavesearch-api-statefulset.yaml (see
# docs/wavesearch-api-multi-reader-single-writer.md) -- kept here for
# reference/rollback only; NOT referenced by kustomization.yaml. The
# 3 independent-emptyDir replicas this Deployment created had no way to
# stay consistent with each other (see that doc's "the problem"
# section) -- the StatefulSet + wavesearch_repl.py replication engine
# fixes that.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wavesearch-api
  labels:
    app: wavesearch-api
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wavesearch-api
  template:
    metadata:
      labels:
        app: wavesearch-api
        component: backend
    spec:
      containers:
      - name: wavesearch-api
        image: ghcr.io/willeastbury/wavesearch-labs-retail-search-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8803
          name: http
        env:
        - name: PORT
          value: "8803"
        - name: WAVE_STS_URL
          value: "http://wave-sts:8801"
        - name: WAVE_STS_SECRET
          valueFrom:
            secretKeyRef:
              name: wave-sts-secret
              key: secret
        - name: WAVESTORE_ERP_API_URL
          value: "http://wavestore-erp-api:8802"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "384Mi"
            cpu: "150m"
          limits:
            memory: "768Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8803
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8803
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: search-index
          mountPath: /app/index
      volumes:
      - name: search-index
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wavesearch-api
  labels:
    app: wavesearch-api
spec:
  type: ClusterIP
  ports:
  - port: 8803
    targetPort: 8803
    protocol: TCP
    name: http
  selector:
    app: wavesearch-api
